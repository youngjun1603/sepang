<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세팡 파트너 — 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 360px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; color: #1A1A1A; margin-bottom: 12px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #FFD600;
      color: #1A1A1A;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>인터넷 연결 없음</h1>
    <p>네트워크 연결을 확인해 주세요.<br/>연결 후 새 주문을 받을 수 있어요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
