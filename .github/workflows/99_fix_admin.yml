name: Fix admin password (one-time)
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Python bcrypt hash and update admin
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          pip install bcrypt pyotp -q

          HASH=$(python3 -c "
          import bcrypt
          pw = 'AdminSepang2024!'
          h = bcrypt.hashpw(pw.encode(), bcrypt.gensalt(rounds=10)).decode()
          print(h)
          ")

          echo "Generated hash: ${HASH:0:20}..."

          SQL="UPDATE users SET password_hash = '$HASH' WHERE email = 'admin@sepang.kr' AND role = 'ADMIN';
          SELECT id, email, role, is_active, LEFT(password_hash,20)||'...' AS pw_preview FROM users WHERE email = 'admin@sepang.kr';"

          RESPONSE=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          echo "$RESPONSE" | jq .
