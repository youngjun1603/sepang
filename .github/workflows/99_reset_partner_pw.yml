name: 99 Reset Partner Password (임시)

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: pip install bcrypt -q

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Reset partner password
        env:
          PGPASSWORD: "Sepang2026!"
        run: |
          HASH=$(python3 -c "
          import bcrypt
          pw = 'PartnerSepang1234!'
          h = bcrypt.hashpw(pw.encode(), bcrypt.gensalt(rounds=10)).decode()
          print(h)
          ")
          echo "New hash: ${HASH:0:25}..."

          psql "postgresql://postgres.apghgbecayjfsuswaggf@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres" \
            -c "UPDATE users SET password_hash = '$HASH' WHERE phone = '01000000002' AND role = 'PARTNER';"

          echo "Partner password reset to: PartnerSepang1234!"
