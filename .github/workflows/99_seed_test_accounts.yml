name: Seed test accounts (one-time)
on:
  workflow_dispatch:
jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Insert test accounts via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          SQL="
          INSERT INTO users (role, name, phone, is_active)
          VALUES ('CUSTOMER', '테스트고객', '01000000001', true)
          ON CONFLICT (phone) DO NOTHING;

          INSERT INTO users (role, name, phone, business_number, password_hash, is_active)
          VALUES ('PARTNER', '테스트점주', '01000000002', '000-00-00001',
            '\$2b\$10\$Cdctu5QdCswSjDuPVJSQ1enSbG5ajuxN9snEudVnCIii0Qj9rbYwu', true)
          ON CONFLICT (phone) DO NOTHING;

          INSERT INTO shops (owner_id, name, region, team_type, is_active, is_available, location, address)
          SELECT id, '테스트세탁소', '경기도 수원시', 'BOTH', true, true,
            ST_SetSRID(ST_MakePoint(127.0276, 37.2636), 4326),
            '경기도 수원시 장안구 수성로275번길 51'
          FROM users WHERE phone = '01000000002' AND role = 'PARTNER'
          ON CONFLICT DO NOTHING;

          INSERT INTO users (role, name, email, phone, password_hash, totp_secret, is_active)
          VALUES ('ADMIN', '관리자', 'admin@sepang.kr', '01000000003',
            '\$2b\$10\$GP0wmj8ENNC4rDuxK1OQDeVhoSKo.IXbScMqc1A4bS6S4R2VOuGJu',
            'DX6ZO772WT72R2QL7JOXYUD76BJ35YBJ', true)
          ON CONFLICT (email) DO UPDATE SET
            password_hash = EXCLUDED.password_hash,
            totp_secret   = EXCLUDED.totp_secret;

          SELECT role, name, phone, email, business_number, is_active
          FROM users
          WHERE phone IN ('01000000001','01000000002','01000000003')
          ORDER BY role;
          "
          RESPONSE=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          echo "$RESPONSE" | jq .
          echo "$RESPONSE" | jq -e '.error' && exit 1 || exit 0
