# ============================================================
# PR 자동 검사 — 코드 품질 게이팅
# ============================================================
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # PR 크기 제한 (리뷰 가능한 단위 강제)
  pr-size:
    name: "PR size check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check PR size
        run: |
          LINES=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -o '[0-9]* insertion' | grep -o '[0-9]*' || echo 0)
          echo "Changed lines: $LINES"
          if [ "$LINES" -gt 1000 ]; then
            echo "::warning::PR이 너무 큽니다 ($LINES 줄). 작은 단위로 분리를 권장합니다."
          fi

  # 마이그레이션 파일 변경 시 경고
  migration-check:
    name: "Migration safety check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check for migration files
        run: |
          MIGRATION_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "alembic/versions/" || true)
          if [ -n "$MIGRATION_CHANGES" ]; then
            echo "::notice::⚠️ DB 마이그레이션 파일이 변경되었습니다:"
            echo "$MIGRATION_CHANGES"
            # downgrade 함수 존재 확인
            for f in $MIGRATION_CHANGES; do
              if ! grep -q "def downgrade" "$f"; then
                echo "::error::$f — downgrade() 함수가 없습니다. 롤백 시 문제가 발생할 수 있습니다."
                exit 1
              fi
            done
          fi

  # API 문서 자동 업데이트 확인
  api-docs:
    name: "API docs sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install fastapi uvicorn
      - name: Generate OpenAPI spec
        run: |
          python3 -c "
          try:
            from main import app
            import json
            spec = app.openapi()
            with open('openapi-generated.json','w') as f:
              json.dump(spec, f, indent=2)
            print('OpenAPI spec generated successfully')
          except Exception as e:
            print(f'Cannot generate spec: {e}')
          "

