# ============================================================
# 모니터링 — 헬스 체크 + SLA 감시
# 5분마다 실행 / 매일 03:00 KST Supabase 연결 확인
# ============================================================
name: Monitoring & Health

# 도메인 연결 후 아래 변수만 변경
env:
  API_URL:      https://api.sepang.kr
  CUSTOMER_URL: https://sepang.kr
  PARTNER_URL:  https://partner.sepang.kr

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 — 헬스 체크
    - cron: "0 18 * * *"     # 매일 18:00 UTC (03:00 KST) — DB 상태 확인
  workflow_dispatch:

jobs:
  # ── 헬스 체크 (10분마다) ─────────────────────────────────
  health-check:
    name: "Health check"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/10 * * * *'

    steps:
      - name: Check all endpoints
        id: healthcheck
        run: |
          FAILED=0
          check() {
            URL=$1; NAME=$2
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" --max-time 15 || echo "000")
            if [ "$STATUS" != "200" ]; then
              echo "::error::$NAME failed — HTTP $STATUS ($URL)"
              FAILED=$((FAILED+1))
            else
              echo "✅ $NAME — $STATUS"
            fi
          }
          check "${{ env.API_URL }}/health"            "API Health"
          check "${{ env.API_URL }}/api/v1/health/db"  "DB Connection"
          check "${{ env.CUSTOMER_URL }}"              "Customer App"
          check "${{ env.PARTNER_URL }}"               "Partner App"
          exit $FAILED

      - name: Alert on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 *서비스 이상 감지*\n헬스 체크 실패 — 즉시 확인 필요\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── SLA 위반 주문 감시 (10분마다) ────────────────────────
  sla-monitor:
    name: "SLA violation monitor"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/10 * * * *'

    steps:
      - name: Check SLA at-risk orders via API
        id: sla
        continue-on-error: true
        env:
          MONITOR_API_TOKEN: ${{ secrets.MONITOR_API_TOKEN }}
        run: |
          if [ -z "$MONITOR_API_TOKEN" ]; then
            echo "MONITOR_API_TOKEN not set — skipping SLA check"
            echo "at_risk_count=0"    >> $GITHUB_OUTPUT
            echo "breached_count=0"   >> $GITHUB_OUTPUT
            exit 0
          fi
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $MONITOR_API_TOKEN" \
            "${{ env.API_URL }}/api/v1/admin/sla-at-risk" \
            --max-time 15 || echo '[]')
          COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))" 2>/dev/null || echo "0")
          BREACHED=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          print(sum(1 for o in data if isinstance(o.get('hours_left'), (int,float)) and o['hours_left'] < 0))
          " 2>/dev/null || echo "0")
          echo "at_risk_count=$COUNT"    >> $GITHUB_OUTPUT
          echo "breached_count=$BREACHED" >> $GITHUB_OUTPUT
          echo "SLA at-risk: $COUNT, Breached: $BREACHED"

      - name: Alert on SLA breach
        if: steps.sla.outputs.breached_count != '0' && steps.sla.outputs.breached_count != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 *SLA 위반 발생*\n위반: ${{ steps.sla.outputs.breached_count }}건 | 위험: ${{ steps.sla.outputs.at_risk_count }}건\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|상세보기>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Supabase DB 연결 일일 확인 (03:00 KST) ───────────────
  db-daily-check:
    name: "Supabase DB daily check"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 18 * * *'

    steps:
      - name: Verify Supabase DB connection
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ env.API_URL }}/api/v1/health/db" --max-time 20 || echo "000")
          echo "DB health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Supabase DB connection failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Supabase DB connection OK"

      - name: Verify Supabase Storage
        continue-on-error: true
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ env.API_URL }}/api/v1/health/storage" --max-time 15 || echo "000")
          echo "Storage health status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Supabase Storage OK" || echo "⚠️ Storage check: $STATUS"

      - name: Alert on DB failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ *DB 연결 이상*\nSupabase PostgreSQL 응답 없음 — 즉시 확인 필요\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
