name: 99 Fix OTP (테스트용)

on:
  workflow_dispatch:

jobs:
  fix-otp:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Re-insert fresh OTP via psql
        env:
          PGPASSWORD: "Sepang2026!"
        run: |
          OTP_HASH=$(python3 -c "import hashlib; print(hashlib.sha256('123456'.encode()).hexdigest())")
          echo "OTP hash: $OTP_HASH"

          psql "postgresql://postgres.apghgbecayjfsuswaggf@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres" <<SQL
          DELETE FROM otp_verifications WHERE phone = '01000000001';
          INSERT INTO otp_verifications (phone, code, purpose, expires_at)
          VALUES ('01000000001', '$OTP_HASH', 'LOGIN', NOW() + INTERVAL '120 minutes');
          SELECT phone, purpose, expires_at, attempts FROM otp_verifications WHERE phone = '01000000001';
          SQL

          echo "Done — OTP 123456 valid for 120 minutes"
