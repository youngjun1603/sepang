[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# Keep critical rules: syntax errors, undefined names, redefinitions
select = ["E9", "F63", "F7", "F8", "W605", "E711", "E712"]
# Ignore common style choices in this codebase
ignore = [
    "F401",  # unused import — many imports are used conditionally or in type hints
    "F841",  # local variable assigned but never used
    "E401",  # multiple imports on one line
    "E701",  # multiple statements on colon
    "E402",  # module import not at top of file
]
# Don't auto-fix in CI
[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["F401", "E401", "E402"]
"tasks.py"  = ["F401", "E401"]
"tests/*"   = ["F401", "E701"]
