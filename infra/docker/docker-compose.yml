# 세팡 운영 인프라 — Docker Compose (로컬 개발 / 스테이징)
# 프로덕션: AWS ECS + RDS + ElastiCache 로 교체

version: "3.9"

services:

  # ── PostgreSQL + PostGIS ───────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sepang-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sepang
      POSTGRES_USER:     sepang
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepang"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sepang-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI 백엔드 ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sepang-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://sepang:${POSTGRES_PASSWORD}@postgres:5432/sepang
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET:      ${JWT_SECRET}
      AWS_REGION:      ap-northeast-2
      S3_BUCKET:       ${S3_BUCKET}
      FCM_SERVER_KEY:  ${FCM_SERVER_KEY}
      KAKAO_APP_KEY:   ${KAKAO_APP_KEY}
      DEBUG:           "false"
    ports:
      - "8000:8000"
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --proxy-headers
        --forwarded-allow-ips "*"

  # ── Celery Worker (알림 & 비동기) ──────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sepang-celery-worker
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:   postgresql://sepang:${POSTGRES_PASSWORD}@postgres:5432/sepang
      REDIS_URL:      redis://:${REDIS_PASSWORD}@redis:6379/0
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
      KAKAO_APP_KEY:  ${KAKAO_APP_KEY}
    command: >
      celery -A tasks worker
        --loglevel=info
        --concurrency=4
        -Q default,notifications,settlements

  # ── Celery Beat (스케줄러) ─────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sepang-celery-beat
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A tasks beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Nginx 리버스 프록시 ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sepang-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

  # ── Flower (Celery 모니터링, 개발용) ──────────────────────
  flower:
    image: mher/flower:latest
    container_name: sepang-flower
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FLOWER_BASIC_AUTH: admin:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    profiles:
      - dev   # 개발 환경에서만 실행

volumes:
  postgres_data:
  redis_data:

