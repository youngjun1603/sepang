# Nginx 리버스 프록시 설정

# ── 고객 앱 ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name sepang.kr www.sepang.kr;

    ssl_certificate     /etc/ssl/certs/sepang.crt;
    ssl_certificate_key /etc/ssl/private/sepang.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://customer_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 실시간 추적
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}

# ── 점주 앱 ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name partner.sepang.kr;

    ssl_certificate     /etc/ssl/certs/sepang.crt;
    ssl_certificate_key /etc/ssl/private/sepang.key;

    location / {
        proxy_pass http://partner_app:3001;
        proxy_set_header Host $host;
    }
}

# ── 관리자 (VPN 전용) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.internal.sepang.kr;

    ssl_certificate     /etc/ssl/certs/sepang-internal.crt;
    ssl_certificate_key /etc/ssl/private/sepang-internal.key;

    # VPN 내부망만 허용 (10.0.0.0/8)
    allow   10.0.0.0/8;
    deny    all;

    location / {
        proxy_pass http://admin_app:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name sepang.kr www.sepang.kr partner.sepang.kr;
    return 301 https://$host$request_uri;
}

